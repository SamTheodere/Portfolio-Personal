<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Aranyakaa — Eco-Luxe Retreats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:         #B8963E;
      --gold-light:   #D4AF6A;
      --gold-dark:    #8A6D28;
      --gold-glow:    rgba(184,150,62,0.12);
      --gold-line:    rgba(184,150,62,0.25);

      --bg:           #FDFAF5;
      --bg-warm:      #F7F2EA;
      --bg-section:   #F2EDE3;
      --bg-dark-card: #1A1E1A;

      --ink:          #1C1C1A;
      --ink-mid:      #4A4840;
      --ink-soft:     #7A756C;
      --ink-faint:    #C5BFB3;

      --white:        #FFFFFF;
      --border:       rgba(184,150,62,0.2);
      --border-light: rgba(184,150,62,0.12);

      --font-display: 'Cinzel', serif;
      --font-body:    'Cormorant Garamond', serif;
      --font-ui:      'DM Sans', sans-serif;

      --nav-h:        88px;
      --ease:         cubic-bezier(0.25,0.8,0.25,1);
      --transition:   0.45s cubic-bezier(0.25,0.8,0.25,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font-body); overflow-x: hidden; cursor: none; }
    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; }
    ul { list-style: none; }

    /* ── CURSOR ── */
    #cursor-dot {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
    }
    #cursor-ring {
      width: 32px; height: 32px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.15s ease, border-color 0.3s;
      opacity: 0.6;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg-warm); }
    ::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 10000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 32px;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-logo-wrap { text-align: center; }
    .loader-logo-img {
      width: 90px; height: 90px;
      background: var(--gold-glow);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-family: var(--font-display);
      font-size: 1.8rem; color: var(--gold);
    }
    .loader-name {
      font-family: var(--font-display);
      font-size: 1.1rem; letter-spacing: 0.35em; color: var(--gold);
    }
    .loader-sub {
      font-family: var(--font-ui);
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--ink-soft); margin-top: 6px;
    }
    .loader-bar { width: 160px; height: 1px; background: var(--bg-section); position: relative; overflow: hidden; }
    .loader-bar::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: loadbar 1.4s ease forwards;
    }
    @keyframes loadbar { 0%{left:-100%} 100%{left:100%} }

    /* ── UTILITIES ── */
    .container { max-width: 1320px; margin: 0 auto; padding: 0 48px; }

    .label {
      font-family: var(--font-ui); font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); display: flex; align-items: center; gap: 14px;
    }
    .label::before { content:''; display:block; width:36px; height:1px; background: var(--gold); }

    .headline {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.8vw, 3.4rem);
      font-weight: 500; line-height: 1.12; letter-spacing: 0.02em;
      color: var(--ink);
    }
    .headline .em { color: var(--gold); font-style: italic; }

    .gold-rule { width: 56px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin: 18px 0 28px; }

    .btn-gold {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-size: 0.73rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--white); background: var(--gold);
      padding: 14px 36px; border: none; cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .btn-gold:hover { background: var(--gold-dark); transform: translateY(-1px); }

    .btn-line {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--font-ui); font-size: 0.73rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); background: transparent;
      padding: 13px 35px; border: 1px solid var(--gold); cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .btn-line:hover { background: var(--gold); color: var(--white); }

    /* ── REVEAL ── */
    .reveal { opacity:0; transform:translateY(30px); transition:opacity 0.85s ease,transform 0.85s ease; }
    .reveal.in { opacity:1; transform:translateY(0); }
    .reveal-l { opacity:0; transform:translateX(-40px); transition:opacity 0.85s ease,transform 0.85s ease; }
    .reveal-l.in { opacity:1; transform:translateX(0); }
    .reveal-r { opacity:0; transform:translateX(40px); transition:opacity 0.85s ease,transform 0.85s ease; }
    .reveal-r.in { opacity:1; transform:translateX(0); }

    /* ══════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════ */
    #nav {
      position: fixed; top:0; left:0; right:0; height: var(--nav-h);
      z-index: 1000; transition: background 0.5s, box-shadow 0.5s, height 0.4s;
      background: rgba(253,250,245,0);
    }
    #nav.scrolled {
      background: rgba(253,250,245,0.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      height: 70px; box-shadow: 0 1px 0 var(--border-light);
    }
    .nav-inner { height:100%; display:flex; align-items:center; justify-content:space-between; }

    .nav-logo { display:flex; align-items:center; gap:12px; }
    .nav-logo-mark {
      width: 56px; height: 56px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg-warm);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .nav-logo-mark:hover { border-color: var(--gold); }
    .nav-logo-mark svg { width:30px; height:30px; }
    .nav-logo-text-wrap { display:flex; flex-direction:column; line-height:1; }
    .nav-logo-text-wrap .n1 { font-family:var(--font-display); font-size:0.95rem; letter-spacing:0.2em; color:var(--gold); }
    .nav-logo-text-wrap .n2 { font-family:var(--font-ui); font-size:0.55rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--ink-soft); margin-top:4px; }

    .nav-links { display:flex; gap:36px; }
    .nav-links a {
      font-family:var(--font-ui); font-size:0.73rem; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--ink-mid); position:relative; transition:color 0.3s;
    }
    .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:var(--gold); transition:width 0.3s; }
    .nav-links a:hover { color:var(--gold); }
    .nav-links a:hover::after { width:100%; }

    .nav-right { display:flex; align-items:center; gap:20px; }
    .nav-phone { font-family:var(--font-ui); font-size:0.72rem; color:var(--ink-soft); display:flex; align-items:center; gap:7px; }
    .nav-phone svg { color:var(--gold); }

    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; }
    .hamburger span { display:block; width:24px; height:1.5px; background:var(--ink-mid); transition:var(--transition); }

    #mnav {
      display:none; position:fixed; inset:0;
      background:rgba(253,250,245,0.98); backdrop-filter:blur(20px);
      z-index:999; flex-direction:column; align-items:center; justify-content:center; gap:28px;
    }
    #mnav.open { display:flex; }
    #mnav a { font-family:var(--font-display); font-size:1.8rem; color:var(--ink-mid); letter-spacing:0.08em; transition:color 0.3s; }
    #mnav a:hover { color:var(--gold); }
    #mnav-close { position:absolute; top:28px; right:36px; font-size:1.8rem; cursor:pointer; color:var(--gold); font-family:var(--font-ui); }

    /* ══════════════════════════════════════════
       HERO SECTION - YOUTUBE INTEGRATION
    ══════════════════════════════════════════ */
    #hero {
      position: relative; height: 100vh; min-height: 680px;
      display: flex; align-items: center;
      overflow: hidden;
    }

    .hero-video-wrap {
      position: absolute; 
      inset: 0; 
      z-index: 0; 
      overflow: hidden;
      background: #000;
    }

    /* This ensures the YouTube iframe covers the screen like a background video */
    .yt-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      pointer-events: none; /* Prevents users from pausing/clicking the video */
    }

    .yt-container iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw; /* 16:9 Ratio */
      min-height: 100vh;
      min-width: 177.77vh; /* 16:9 Ratio */
      transform: translate(-50%, -50%);
      border: none;
    }

    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(to right,
          rgba(253,250,245,0.92) 0%,
          rgba(253,250,245,0.78) 32%,
          rgba(253,250,245,0.38) 58%,
          rgba(253,250,245,0.05) 78%,
          rgba(253,250,245,0.0) 100%
        ),
        linear-gradient(to top,
          rgba(20,18,14,0.45) 0%,
          rgba(20,18,14,0.0) 55%
        );
    }

    .hero-content { position:relative; z-index:2; max-width:580px; }
    .hero-eyebrow {
      font-family:var(--font-ui); font-size:0.68rem; letter-spacing:0.35em; text-transform:uppercase;
      color:var(--gold); display:flex; align-items:center; gap:14px; margin-bottom:22px;
      opacity:0; animation: fadeUp 1s ease 0.7s forwards;
    }
    .hero-eyebrow::before { content:''; width:36px; height:1px; background:var(--gold); }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 5.5vw, 4.8rem);
      font-weight: 400; line-height: 1.08; letter-spacing: 0.02em;
      color: var(--ink); margin-bottom: 26px;
      opacity:0; animation: fadeUp 1s ease 0.95s forwards;
      text-shadow: 0 1px 3px rgba(253,250,245,0.6);
    }
    .hero-title .italic { font-style:italic; color:var(--gold); }

    .hero-desc {
      font-family:var(--font-body); font-size:1.1rem; font-weight:300; line-height:1.85;
      color:var(--ink-mid); max-width:440px; margin-bottom:44px;
      opacity:0; animation: fadeUp 1s ease 1.15s forwards;
    }
    .hero-actions { display:flex; gap:14px; flex-wrap:wrap; opacity:0; animation: fadeUp 1s ease 1.3s forwards; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

    .hero-stats {
      position: absolute; right: 48px; bottom: 80px; z-index: 3;
      display: flex; flex-direction: column; gap: 1px;
    }
    .hstat {
      background: rgba(253,250,245,0.9); backdrop-filter:blur(16px);
      border: 1px solid var(--border); padding: 18px 26px; text-align:center;
      opacity:0; animation: fadeUp 0.8s ease forwards;
    }
    .hstat:nth-child(1) { animation-delay:1.5s; }
    .hstat:nth-child(2) { animation-delay:1.65s; }
    .hstat:nth-child(3) { animation-delay:1.8s; }
    .hstat-num { font-family:var(--font-display); font-size:1.9rem; color:var(--gold); }
    .hstat-lbl { font-family:var(--font-ui); font-size:0.58rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px; }

    .scroll-ind {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .scroll-ind span { font-family:var(--font-ui); font-size:0.58rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--ink-soft); }
    .scroll-line { width:1px; height:44px; background:linear-gradient(to bottom,var(--gold),transparent); animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* ══════════════════════════════════════════
       BOOKING WIDGET
    ══════════════════════════════════════════ */
    #booking { position:relative; z-index:10; margin-top:-2px; }
    .booking-wrap {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-top: 3px solid var(--gold);
      box-shadow: 0 4px 48px rgba(0,0,0,0.06);
      padding: 36px 48px;
      display: grid;
      grid-template-columns: repeat(5,1fr) auto;
      gap: 0; align-items: end;
    }
    .b-field { padding: 0 24px; border-right: 1px solid var(--bg-section); }
    .b-field:first-child { padding-left: 0; }
    .b-field:last-of-type { border-right: none; }
    .b-field label {
      display: block; font-family:var(--font-ui); font-size:0.58rem;
      letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); margin-bottom:10px;
    }
    .b-field select, .b-field input {
      width:100%; background:transparent; border:none; border-bottom:1px solid var(--ink-faint);
      color:var(--ink); font-family:var(--font-body); font-size:1rem;
      padding:8px 0; outline:none; cursor:pointer; appearance:none; -webkit-appearance:none;
      transition:border-color 0.3s;
    }
    .b-field select:focus, .b-field input:focus { border-bottom-color:var(--gold); }
    .b-field select option { background:var(--bg); }
    .b-btn {
      background: var(--gold); color:var(--white); border:none;
      font-family:var(--font-ui); font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase;
      padding:18px 32px; cursor:pointer; display:flex; align-items:center; gap:10px;
      transition:background 0.3s;
    }
    .b-btn:hover { background: var(--gold-dark); }

    /* ══════════════════════════════════════════
       TICKER
    ══════════════════════════════════════════ */
    #ticker {
      padding: 22px 0;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-warm); overflow:hidden;
    }
    .ticker-track {
      display: flex; gap: 0; width: max-content;
      animation: tick 28s linear infinite;
    }
    .ticker-track:hover { animation-play-state:paused; }
    @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .tick-item {
      display:flex; align-items:center; gap:18px; padding:0 36px;
      font-family:var(--font-display); font-size:0.95rem; letter-spacing:0.08em;
      color:var(--ink-soft); white-space:nowrap; transition:color 0.3s;
    }
    .tick-item:hover { color:var(--gold); }
    .tick-dot { width:4px; height:4px; background:var(--gold); border-radius:50%; flex-shrink:0; }

    /* ══════════════════════════════════════════
       ABOUT
    ══════════════════════════════════════════ */
    #about { padding:130px 0; background:var(--bg); position:relative; overflow:hidden; }
    #about::after {
      content:'ARANYAKAA';
      position:absolute; right:-80px; top:50%; transform:translateY(-50%) rotate(90deg);
      font-family:var(--font-display); font-size:9rem; font-weight:600;
      color:rgba(184,150,62,0.04); pointer-events:none; white-space:nowrap; letter-spacing:0.2em;
    }
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:88px; align-items:center; }

    .about-imgs { position:relative; }
    .about-main {
      aspect-ratio: 3/4;
      background: linear-gradient(135deg, #DDD4C0 0%, #C4B89A 100%);
      border: 1px dashed var(--gold-line);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .about-sec {
      position:absolute; right:-56px; bottom:-56px; width:52%;
      aspect-ratio:4/3;
      background:linear-gradient(135deg, #E8E0CE 0%, #D0C4AC 100%);
      border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    }
    .about-badge {
      position:absolute; left:-36px; top:56px; width:108px; height:108px;
      border-radius:50%; background:var(--gold);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow: 0 8px 32px rgba(184,150,62,0.35);
    }
    .about-badge .b-num { font-family:var(--font-display); font-size:1.7rem; color:var(--white); line-height:1; }
    .about-badge .b-txt { font-family:var(--font-ui); font-size:0.5rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.8); margin-top:4px; text-align:center; padding:0 6px; }

    .img-ph { font-family:var(--font-ui); font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(184,150,62,0.5); text-align:center; padding:24px; }
    .img-ph span { font-size:2rem; display:block; margin-bottom:8px; }

    .about-features { margin-top:36px; display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .af { display:flex; gap:14px; align-items:flex-start; }
    .af-icon { width:42px; height:42px; flex-shrink:0; border:1px solid var(--border); background:var(--bg-warm); display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .af-text h4 { font-family:var(--font-display); font-size:1rem; font-weight:500; margin-bottom:4px; color:var(--ink); }
    .af-text p { font-family:var(--font-ui); font-size:0.72rem; color:var(--ink-soft); line-height:1.6; }

    /* ══════════════════════════════════════════
       RESORTS
    ══════════════════════════════════════════ */
    #resorts { padding:130px 0; background:var(--bg-warm); }
    .resorts-hd { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:56px; }
    .resorts-grid { display:grid; grid-template-columns:1.4fr 1fr 1fr; grid-template-rows:auto auto; gap:16px; }
    .rc { position:relative; overflow:hidden; cursor:pointer; }
    .rc:first-child { grid-row:1/3; }
    .rc-img {
      width:100%; height:100%; min-height:280px;
      background:linear-gradient(135deg, #D4C9B0 0%, #B8AD94 100%);
      position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
    }
    .rc:first-child .rc-img { min-height:580px; }
    .rc-img::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to top,rgba(26,30,26,0.82) 0%,rgba(26,30,26,0) 55%);
      transition:var(--transition);
    }
    .rc:hover .rc-img::after { background:linear-gradient(to top,rgba(26,30,26,0.92) 0%,rgba(26,30,26,0.2) 100%); }
    .rc-ph { font-family:var(--font-ui); font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(184,150,62,0.4); text-align:center; }
    .rc-info { position:absolute; bottom:0; left:0; right:0; padding:26px; z-index:2; }
    .rc-loc { font-family:var(--font-ui); font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold-light); display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .rc-loc::before { content:''; width:16px; height:1px; background:var(--gold-light); }
    .rc-name { font-family:var(--font-display); font-size:1.35rem; font-weight:500; color:var(--white); margin-bottom:10px; }
    .rc:first-child .rc-name { font-size:1.8rem; }
    .rc-meta { font-family:var(--font-ui); font-size:0.65rem; color:rgba(255,255,255,0.65); display:flex; gap:14px; margin-bottom:18px; }
    .rc-cta { display:inline-flex; align-items:center; gap:8px; font-family:var(--font-ui); font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-light); opacity:0; transform:translateY(8px); transition:var(--transition); }
    .rc:hover .rc-cta { opacity:1; transform:translateY(0); }
    .rc-cta svg { transition:transform 0.3s; }
    .rc:hover .rc-cta svg { transform:translateX(5px); }

    /* ══════════════════════════════════════════
       GALLERY STRIP
    ══════════════════════════════════════════ */
    #gallery { overflow:hidden; }
    .g-track { display:flex; gap:3px; height:300px; }
    .g-item {
      flex:1; min-width:180px;
      background:linear-gradient(135deg, #D4C9B0 0%, #B8AD94 100%);
      position:relative; overflow:hidden; transition:flex 0.55s ease; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .g-item:hover { flex:2.5; }
    .g-label { position:absolute; bottom:0; left:0; right:0; padding:20px; background:linear-gradient(to top,rgba(26,30,26,0.85),transparent); font-family:var(--font-display); font-size:1rem; color:var(--white); opacity:0; transition:opacity 0.35s; }
    .g-item:hover .g-label { opacity:1; }
    .g-ph { font-family:var(--font-ui); font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(184,150,62,0.4); text-align:center; padding:16px; }

    /* ══════════════════════════════════════════
       EXPERIENCES / TABS
    ══════════════════════════════════════════ */
    #experiences { padding:130px 0; background:var(--bg); position:relative; }
    .exp-hd { margin-bottom:52px; }
    .exp-tabs { display:flex; border-bottom:1px solid var(--border-light); margin-bottom:48px; }
    .etab {
      font-family:var(--font-ui); font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--ink-soft); padding:13px 26px; cursor:pointer; background:none; border:none;
      position:relative; transition:color 0.3s;
    }
    .etab::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px; background:var(--gold); transform:scaleX(0); transition:transform 0.35s; }
    .etab.active { color:var(--gold); }
    .etab.active::after { transform:scaleX(1); }
    .etab:hover { color:var(--ink); }
    .epanel { display:none; }
    .epanel.active { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
    .ecard {
      background:var(--white); border:1px solid var(--border-light);
      overflow:hidden; transition:border-color 0.3s, transform 0.3s, box-shadow 0.3s; cursor:pointer;
    }
    .ecard:hover { border-color:var(--gold); transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.07); }
    .ecard-img {
      aspect-ratio:4/3;
      background:linear-gradient(135deg, #DDD4C0 0%, #C4B89A 100%);
      display:flex; align-items:center; justify-content:center; font-size:2rem; color:rgba(184,150,62,0.4);
    }
    .ecard-body { padding:24px; }
    .ecard-tag { font-family:var(--font-ui); font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:9px; }
    .ecard-title { font-family:var(--font-display); font-size:1.2rem; font-weight:500; color:var(--ink); margin-bottom:10px; }
    .ecard-desc { font-family:var(--font-ui); font-size:0.76rem; color:var(--ink-soft); line-height:1.7; margin-bottom:18px; }
    .ecard-footer { display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-light); padding-top:16px; }
    .eprice { font-family:var(--font-display); font-size:1.25rem; color:var(--gold); }
    .eprice span { font-family:var(--font-ui); font-size:0.58rem; color:var(--ink-soft); display:block; }
    .ebook { font-family:var(--font-ui); font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--white); background:var(--gold); padding:9px 16px; transition:background 0.3s; }
    .ebook:hover { background:var(--gold-dark); }

    /* ══════════════════════════════════════════
       MEMBERSHIP
    ══════════════════════════════════════════ */
    #membership { padding:130px 0; background:var(--bg-section); }
    .mem-grid { display:grid; grid-template-columns:1fr 1.15fr; gap:80px; align-items:center; }
    .mem-img {
      aspect-ratio:4/5;
      background:linear-gradient(135deg, #D4C9B0 0%, #B8AD94 100%);
      border:1px dashed var(--gold-line);
      display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
    }
    .mem-float {
      position:absolute; bottom:28px; right:-28px;
      background:var(--white); border:1px solid var(--border);
      padding:18px 26px; text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.1);
    }
    .mem-float .mf-n { font-family:var(--font-display); font-size:1.8rem; color:var(--gold); }
    .mem-float .mf-l { font-family:var(--font-ui); font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-soft); }
    .mem-cards { margin-top:32px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .mc {
      background:var(--white); border:1px solid var(--border-light); padding:22px;
      transition:border-color 0.3s, box-shadow 0.3s;
    }
    .mc:hover { border-color:var(--gold); box-shadow:0 4px 24px rgba(184,150,62,0.1); }
    .mc-icon { font-size:1.4rem; margin-bottom:10px; }
    .mc-title { font-family:var(--font-display); font-size:1rem; font-weight:500; color:var(--ink); margin-bottom:6px; }
    .mc-text { font-family:var(--font-ui); font-size:0.72rem; color:var(--ink-soft); line-height:1.65; }
    .mem-price {
      margin-top:32px;
      background:var(--white); border:1px solid var(--border);
      border-left:3px solid var(--gold);
      padding:26px 28px; display:flex; justify-content:space-between; align-items:center;
    }
    .mem-price h3 { font-family:var(--font-display); font-size:2rem; color:var(--gold); }
    .mem-price p { font-family:var(--font-ui); font-size:0.68rem; color:var(--ink-soft); margin-top:4px; }

    /* ══════════════════════════════════════════
       TESTIMONIALS
    ══════════════════════════════════════════ */
    #testimonials { padding:130px 0; background:var(--bg); }
    .testi-hd { text-align:center; margin-bottom:60px; }
    .testi-hd .label { justify-content:center; }
    .testi-hd .label::before { display:none; }
    .testi-hd .label::after { content:''; display:block; width:36px; height:1px; background:var(--gold); }
    .tgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
    .tc {
      background:var(--bg-warm); border:1px solid var(--border-light);
      padding:34px; position:relative; transition:border-color 0.35s, box-shadow 0.35s;
    }
    .tc:hover { border-color:var(--gold); box-shadow:0 8px 32px rgba(184,150,62,0.08); }
    .tc-qm { font-family:var(--font-display); font-size:4.5rem; line-height:0.5; color:var(--gold); opacity:0.18; position:absolute; top:26px; right:26px; }
    .tc-stars { display:flex; gap:3px; margin-bottom:18px; color:var(--gold); font-size:0.75rem; }
    .tc-text { font-family:var(--font-body); font-size:1.05rem; font-weight:300; font-style:italic; line-height:1.8; color:var(--ink-mid); margin-bottom:26px; }
    .tc-author { display:flex; align-items:center; gap:12px; }
    .tc-av { width:44px; height:44px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:1.1rem; color:var(--white); flex-shrink:0; }
    .tc-name { font-family:var(--font-display); font-size:0.95rem; font-weight:500; color:var(--ink); }
    .tc-role { font-family:var(--font-ui); font-size:0.62rem; color:var(--gold); letter-spacing:0.1em; margin-top:2px; }

    /* ══════════════════════════════════════════
       CTA
    ══════════════════════════════════════════ */
    #cta { padding:130px 0; background:var(--bg-section); }
    .cta-inner { text-align:center; max-width:680px; margin:0 auto; }
    .cta-ornament { width:1px; height:64px; background:linear-gradient(to bottom,transparent,var(--gold),transparent); margin:0 auto 32px; }
    .cta-inner p.body { font-family:var(--font-body); font-size:1.1rem; font-weight:300; color:var(--ink-mid); line-height:1.8; margin:22px 0 40px; }
    .cta-btns { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }
    .cta-contact {
      margin-top:56px;
      background:var(--white); border:1px solid var(--border-light);
      padding:28px 40px; display:flex; justify-content:space-around; align-items:center; flex-wrap:wrap; gap:24px;
    }
    .cc-item { text-align:center; }
    .cc-lbl { font-family:var(--font-display); font-size:0.8rem; letter-spacing:0.14em; color:var(--gold); margin-bottom:6px; }
    .cc-val { font-family:var(--font-body); font-size:1.05rem; color:var(--ink); }
    .cc-div { width:1px; height:40px; background:var(--border-light); }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    footer { background:var(--bg-dark-card); padding:80px 0 40px; }
    .ft { display:grid; grid-template-columns:1.5fr 1fr 1fr 1fr; gap:56px; margin-bottom:56px; }
    .fb-logo { font-family:var(--font-display); font-size:1.2rem; letter-spacing:0.2em; color:var(--gold); margin-bottom:6px; }
    .fb-tag { font-family:var(--font-ui); font-size:0.58rem; letter-spacing:0.32em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:18px; }
    .fb-desc { font-family:var(--font-body); font-size:0.95rem; color:rgba(255,255,255,0.5); line-height:1.8; }
    .fb-socials { display:flex; gap:10px; margin-top:22px; }
    .fsoc {
      width:36px; height:36px; border:1px solid rgba(184,150,62,0.25);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--font-ui); font-size:0.75rem; color:var(--gold);
      cursor:pointer; transition:var(--transition);
    }
    .fsoc:hover { background:var(--gold); color:var(--bg-dark-card); border-color:var(--gold); }
    .fc h4 { font-family:var(--font-display); font-size:0.95rem; font-weight:500; color:rgba(255,255,255,0.9); margin-bottom:22px; position:relative; padding-bottom:12px; }
    .fc h4::after { content:''; position:absolute; bottom:0; left:0; width:28px; height:1px; background:var(--gold); }
    .fc ul { display:flex; flex-direction:column; gap:10px; }
    .fc ul li a { font-family:var(--font-ui); font-size:0.75rem; color:rgba(255,255,255,0.45); display:flex; align-items:center; gap:8px; transition:color 0.3s; }
    .fc ul li a:hover { color:var(--gold); }
    .fc ul li a::before { content:'—'; color:rgba(184,150,62,0.3); font-size:0.6rem; }
    .fco { display:flex; flex-direction:column; gap:13px; }
    .fco-item { display:flex; gap:12px; }
    .fco-icon { width:32px; height:32px; border:1px solid rgba(184,150,62,0.2); display:flex; align-items:center; justify-content:center; font-size:0.78rem; color:var(--gold); flex-shrink:0; }
    .fco-text { font-family:var(--font-ui); font-size:0.73rem; color:rgba(255,255,255,0.45); line-height:1.6; }
    .fbot { border-top:1px solid rgba(255,255,255,0.06); padding-top:28px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; }
    .fbot p { font-family:var(--font-ui); font-size:0.68rem; color:rgba(255,255,255,0.25); letter-spacing:0.08em; }
    .flegal { display:flex; gap:22px; }
    .flegal a { font-family:var(--font-ui); font-size:0.68rem; color:rgba(255,255,255,0.25); transition:color 0.3s; }
    .flegal a:hover { color:var(--gold); }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media(max-width:1100px) {
      .resorts-grid { grid-template-columns:1fr 1fr; }
      .rc:first-child { grid-row:auto; }
      .booking-wrap { grid-template-columns:repeat(3,1fr); padding:28px 32px; }
      .ft { grid-template-columns:1fr 1fr; }
      .mem-grid { grid-template-columns:1fr; }
      .mem-img { aspect-ratio:16/7; }
    }
    @media(max-width:900px) {
      :root { --nav-h:70px; }
      .nav-links, .nav-phone { display:none; }
      .hamburger { display:flex; }
      .hero-stats { display:none; }
      .about-grid { grid-template-columns:1fr; }
      .about-sec { display:none; }
      .about-badge { left:16px; }
      .tgrid { grid-template-columns:1fr 1fr; }
      .epanel.active { grid-template-columns:1fr 1fr; }
      .booking-wrap { grid-template-columns:repeat(2,1fr); row-gap:22px; }
      .b-field { border-right:none; }
    }
    @media(max-width:600px) {
      .container { padding:0 20px; }
      .hero-title { font-size:2.3rem; }
      .resorts-grid { grid-template-columns:1fr; }
      .tgrid { grid-template-columns:1fr; }
      .epanel.active { grid-template-columns:1fr; }
      .booking-wrap { grid-template-columns:1fr; }
      .about-features { grid-template-columns:1fr; }
      .ft { grid-template-columns:1fr; gap:36px; }
      .mem-cards { grid-template-columns:1fr; }
      .g-track { height:200px; }
      .hero-bg { background: linear-gradient(135deg, #e8e0d0 0%, #c8c0a8 100%); }
    }
  </style>
</head>
